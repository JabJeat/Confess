<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You...</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --text-main: #2d2424;
        --text-muted: #5c4b4b;
        --accent: #e63946;
        --accent-hover: #d62828;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
        
        /* Rich Sunset Gradient */
        background: linear-gradient(180deg, #1a0b2e 0%, #4b1d52 25%, #9a2b53 50%, #de5d4e 80%, #f69d3c 100%);
        background-size: 100% 200%;
        animation: sunsetGlow 12s ease-in-out infinite alternate;
        overflow: hidden;
        position: relative;
      }

      /* Warm golden ambient glow behind the card */
      body::before {
        content: "";
        position: absolute;
        width: 60vw;
        height: 60vw;
        background: radial-gradient(circle, rgba(255, 180, 100, 0.25) 0%, transparent 60%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 0;
        pointer-events: none;
      }

      @keyframes sunsetGlow {
        0% { background-position: 50% 0%; }
        100% { background-position: 50% 100%; }
      }

      /* Premium Glassmorphism Card */
      .container {
        background: rgba(255, 255, 255, 0.55);
        -webkit-backdrop-filter: blur(25px);
        backdrop-filter: blur(25px);
        padding: 70px 50px;
        border-radius: 40px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 
          0 40px 80px rgba(0, 0, 0, 0.15),
          inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        position: relative;
        z-index: 10;
        text-align: center;
        max-width: 90%;
        width: 480px;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        animation: fadeUpIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
      }

      @keyframes fadeUpIn {
        to { opacity: 1; transform: translateY(0); }
      }

      h1 {
        font-family: 'Playfair Display', serif;
        color: var(--text-main);
        font-size: 2.8rem;
        font-weight: 700;
        margin-bottom: 15px;
        line-height: 1.2;
      }

      p {
        color: var(--text-muted);
        font-size: 1.15rem;
        margin-bottom: 45px;
        font-weight: 500;
      }

      .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        position: relative;
        height: 56px;
      }

      button {
        font-family: 'Poppins', sans-serif;
        font-size: 1.1rem;
        padding: 0 40px;
        height: 56px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 12;
      }

      #yesBtn {
        background: var(--accent);
        color: white;
        box-shadow: 0 10px 25px rgba(230, 57, 70, 0.3);
        animation: pulseHeartbeat 2.5s infinite;
      }

      #yesBtn:hover {
        background: var(--accent-hover);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 15px 30px rgba(230, 57, 70, 0.4);
      }

      @keyframes pulseHeartbeat {
        0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.4); }
        70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); }
        100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
      }

      #noBtn {
        background: rgba(255, 255, 255, 0.7);
        color: var(--text-muted);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.9);
      }

      #successMessage {
        display: none;
        flex-direction: column;
        align-items: center;
        position: absolute;
      }

      #successMessage h2 {
        font-family: 'Playfair Display', serif;
        color: var(--text-main);
        font-size: 2.5rem;
        margin-bottom: 25px;
      }

      #successMessage img {
        width: 100%;
        max-width: 300px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        border: 4px solid rgba(255, 255, 255, 0.8);
      }

      /* Elegant floating hearts */
      @keyframes floatSoft {
        0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 0; }
        20% { opacity: 0.6; }
        80% { opacity: 0.6; }
        100% { transform: translateY(-100vh) scale(0.6) rotate(20deg); opacity: 0; }
      }

      .floating-element {
        position: fixed;
        pointer-events: none;
        z-index: 5;
        animation: floatSoft linear forwards;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
      }
    </style>
  </head>
  <body>
    <div class="container" id="mainContainer">
      <h1>Hey [Name],</h1>
      <p>I have a question... Will you be my girlfriend? 🥺</p>

      <div class="buttons" id="buttonGroup">
        <button id="yesBtn" onclick="sayYes()">Yes!</button>
        <button id="noBtn" onmouseover="dodgeCursor()">No</button>
      </div>
    </div>

    <div class="container" id="successMessage">
      <h2>Best decision ever. ❤️</h2>
      <img
        src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif"
        alt="Cute celebration"
      />
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
      const noBtn = document.getElementById("noBtn");

      // Ambient elegant shapes (Hearts and sparkles)
      function createAmbientElement() {
        const el = document.createElement("div");
        el.className = "floating-element";
        el.textContent = ["🤍", "✨", "🌸", "💖"][Math.floor(Math.random() * 4)];
        el.style.fontSize = (Math.random() * 15 + 15) + "px";
        el.style.left = Math.random() * 100 + "vw";
        el.style.bottom = "-50px";
        
        const duration = Math.random() * 6 + 6;
        el.style.animationDuration = duration + "s";
        
        document.body.appendChild(el);
        setTimeout(() => el.remove(), duration * 1000);
      }
      setInterval(createAmbientElement, 600);

      // Smooth Evasive logic for the "No" button
      function dodgeCursor() {
        noBtn.style.position = "fixed";
        
        const padding = 60; 
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;

        const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
        const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

        // Use cubic-bezier for a snappier, more playful dodge
        noBtn.style.transition = "left 0.2s cubic-bezier(0.25, 1, 0.5, 1), top 0.2s cubic-bezier(0.25, 1, 0.5, 1)";
        noBtn.style.left = randomX + "px";
        noBtn.style.top = randomY + "px";
      }

      // Success Celebration Explosion
      function triggerCelebration() {
        for(let i = 0; i < 60; i++) {
          setTimeout(() => {
            const heart = document.createElement("div");
            heart.className = "floating-element";
            heart.textContent = ["💖", "💕", "💘", "🥰"][Math.floor(Math.random() * 4)];
            heart.style.fontSize = (Math.random() * 20 + 20) + "px";
            heart.style.left = (window.innerWidth / 2) + "px";
            heart.style.top = (window.innerHeight / 2) + "px";
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 250 + 100;
            const tx = Math.cos(angle) * velocity;
            const ty = Math.sin(angle) * velocity - 150; 
            
            heart.style.transition = "all 1.8s cubic-bezier(0.1, 0.8, 0.2, 1)";
            
            document.body.appendChild(heart);
            
            // Trigger reflow
            void heart.offsetWidth;
            
            heart.style.transform = `translate(${tx}px, ${ty}px) scale(${Math.random() * 1 + 0.5})`;
            heart.style.opacity = "0";
            
            setTimeout(() => heart.remove(), 1800);
          }, i * 15);
        }
      }

      function notifyAdmin() {
        // Remember to fill these in if you want the email to work!
        const serviceID = "YOUR_SERVICE_ID";
        const templateID = "YOUR_TEMPLATE_ID";
        const publicKey = "YOUR_PUBLIC_KEY";

        if (publicKey !== "YOUR_PUBLIC_KEY" && window.emailjs) {
          emailjs.init(publicKey);
          emailjs.send(serviceID, templateID, {
            to_email: "phanapheakkdey@gmail.com",
            message: "Someone answered YES to your confession!"
          }).catch(console.error);
        }
      }


      function sayYes() {
        notifyAdmin();
        triggerCelebration();
        
        const main = document.getElementById("mainContainer");
        const success = document.getElementById("successMessage");
        
        // Smooth transition out
        main.style.opacity = "0";
        main.style.transform = "translateY(-40px)";
        main.style.pointerEvents = "none";
        
        setTimeout(() => {
          main.style.display = "none";
          success.style.display = "flex";
          
          // Smooth transition in
          requestAnimationFrame(() => {
            success.style.opacity = "1";
            success.style.transform = "translateY(0)";
          });
          
          setTimeout(triggerCelebration, 400);
          setTimeout(triggerCelebration, 1000);
        }, 500);
      }
    </script>
  </body>
</html>
